<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>今天也要守住</title>

    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="full-screen" content="yes"/>
    <meta name="screen-orientation" content="landscape"/>
    <meta name="x5-fullscreen" content="true"/>
    <meta name="360-fullscreen" content="true"/>
    <meta name="renderer" content="webkit"/>
    <meta name="force-rendering" content="webkit"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="theme-color" content="#0f1724"/>

    <link rel="preload" as="script" href="./src/system.bundle.js"/>
    <link rel="stylesheet" type="text/css" href="./style.css"/>
    <link rel="icon" href="favicon.ico"/>
  </head>
  <body>
    <div id="GameDiv" cc_exact_fit_screen="false" style="width: 1280px; height: 720px;">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" width="1280" height="720" tabindex="99"></canvas>
      </div>
    </div>
    <div id="RotateHint" class="rotate-hint">
      <div class="rotate-card">
        <div class="rotate-icon">↻</div>
        <div class="rotate-title">请横屏游玩</div>
        <div class="rotate-steps">
          <p>1. 打开手机「自动旋转」</p>
          <p>2. 把手机横过来</p>
          <p>3. 如果在微信/QQ里不生效，点右上角用浏览器打开</p>
        </div>
        <button id="RotateRetryButton" type="button">我已横屏，继续</button>
      </div>
    </div>

    <script src="src/polyfills.bundle.js" charset="utf-8"></script>
    <script src="src/system.bundle.js" charset="utf-8"></script>
    <script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"></script>
    <script>
      (function () {
        var DESIGN_WIDTH = 1280;
        var DESIGN_HEIGHT = 720;
        var gameDiv = document.getElementById('GameDiv');

        function getViewportSize() {
          var viewport = window.visualViewport;
          return {
            width: viewport ? viewport.width : (window.innerWidth || document.documentElement.clientWidth || DESIGN_WIDTH),
            height: viewport ? viewport.height : (window.innerHeight || document.documentElement.clientHeight || DESIGN_HEIGHT)
          };
        }

        function resizeGame() {
          var viewportSize = getViewportSize();
          var width = viewportSize.width;
          var height = viewportSize.height;
          var isPortrait = height > width && width < 900;
          var isMobileLandscape = width > height && height < 700;
          var containScale = Math.min(width / DESIGN_WIDTH, height / DESIGN_HEIGHT);
          var scale = containScale;

          if (isMobileLandscape) {
            scale = Math.min(width / DESIGN_WIDTH, containScale * 1.22);
          }

          var scaledWidth = Math.floor(DESIGN_WIDTH * scale);
          var scaledHeight = Math.floor(DESIGN_HEIGHT * scale);

          gameDiv.style.width = DESIGN_WIDTH + 'px';
          gameDiv.style.height = DESIGN_HEIGHT + 'px';
          gameDiv.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
          gameDiv.style.left = '50%';
          gameDiv.style.top = '50%';

          document.body.classList.toggle('is-portrait', isPortrait);
          document.body.classList.toggle('is-mobile-landscape', isMobileLandscape);
          document.documentElement.style.setProperty('--game-width', scaledWidth + 'px');
          document.documentElement.style.setProperty('--game-height', scaledHeight + 'px');
        }

        window.addEventListener('resize', resizeGame);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', resizeGame);
          window.visualViewport.addEventListener('scroll', resizeGame);
        }
        window.addEventListener('orientationchange', function () {
          setTimeout(resizeGame, 120);
          setTimeout(resizeGame, 500);
        });

        var retryButton = document.getElementById('RotateRetryButton');
        if (retryButton) {
          retryButton.addEventListener('click', function () {
            if (document.documentElement.requestFullscreen) {
              document.documentElement.requestFullscreen().catch(function () {});
            }
            resizeGame();
          });
        }
        resizeGame();
      })();

      System.import('./index.js').catch(function(err) { console.error(err); });
    </script>
  </body>
</html>
